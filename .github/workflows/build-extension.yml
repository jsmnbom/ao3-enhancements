name: Build extension

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build and submit (e.g. 0.7.0)'
        required: true
      target:
        description: 'Store to submit to'
        required: true
        type: choice
        options:
          - chrome
          - firefox

jobs:
  pre:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.full }}
      is_prerelease: ${{ steps.version.outputs.prerelease && 'true' || 'false' }}
      dist_source_zip: dist/artifacts/source/ao3-enhancements_source_${{ steps.version.outputs.full }}.zip
      dist_chrome_zip: dist/artifacts/chrome/ao3-enhancements_chrome_${{ steps.version.outputs.full }}.zip
      dist_firefox_zip: dist/artifacts/firefox/ao3-enhancements_firefox_${{ steps.version.outputs.full }}.zip
      dist_firefox_xpi: dist/artifacts/firefox/ao3-enhancements_firefox_${{ steps.version.outputs.full }}.xpi

    steps:
      - name: Parse version from tag
        if: github.event_name == 'push'
        id: semver
        uses: release-kit/semver@v2

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "full=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "prerelease=" >> $GITHUB_OUTPUT
          else
            echo "full=${{ steps.semver.outputs.full }}" >> $GITHUB_OUTPUT
            echo "prerelease=${{ steps.semver.outputs.prerelease }}" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: pre

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', inputs.version) || github.ref }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install

      - run: pnpm run build
      - run: pnpm run dist
      - run: pnpm run dist:lint

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  firefox:
    runs-on: ubuntu-latest
    needs: [pre, build]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'firefox')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', inputs.version) || github.ref }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Submit to AMO
        env:
          API_KEY: ${{ secrets.AMO_API_KEY }}
          API_SECRET: ${{ secrets.AMO_API_SECRET }}
          CHANNEL: ${{ needs.pre.outputs.is_prerelease == 'true' && 'unlisted' || 'listed' }}
        run: pnpm dlx web-ext sign --config=scripts/web-ext.firefox.mjs --channel=$CHANNEL --api-key=$API_KEY --api-secret=$API_SECRET --upload-source-code=${{ needs.pre.outputs.dist_source_zip }}

      - name: Rename .xpi to proper version if applicable
        run: |
          if ls dist/artifacts/firefox/*.xpi 1> /dev/null 2>&1; then
            mv dist/artifacts/firefox/*.xpi ${{ needs.pre.outputs.dist_firefox_xpi }}
            rm -f ${{ needs.pre.outputs.dist_firefox_zip }}
          fi

      - name: Upload firefox artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: firefox
          path: dist/artifacts/firefox/

  chrome:
    runs-on: ubuntu-latest
    needs: [pre, build]
    if: (github.event_name == 'push' && needs.pre.outputs.is_prerelease == 'false') || (github.event_name == 'workflow_dispatch' && inputs.target == 'chrome')

    steps:
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Submit to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: pnpm dlx chrome-webstore-upload-cli --source=${{ needs.pre.outputs.dist_chrome_zip }}

  github:
    runs-on: ubuntu-latest
    needs: [pre, build, firefox]
    if: always() && github.event_name == 'push' && needs.pre.result == 'success' && needs.build.result == 'success' && needs.firefox.result == 'success'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: firefox
          path: dist/artifacts/firefox

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create \
            --draft \
            --generate-notes \
            --prerelease=${{ needs.pre.outputs.is_prerelease }} \
            v${{ needs.pre.outputs.version }} \
            ${{ needs.pre.outputs.dist_source_zip }} \
            ${{ needs.pre.outputs.dist_chrome_zip }} \
            dist/artifacts/firefox/*
